                        if (!selectedStock)
                            selectedStock = Math.max(...availableStocks);

                        item.qty = 0;
                        packedSomething = true;
                    }
                }
                if (!packedSomething)
                    break;
            }
        }
        return finalPlan;
    };
    const calculatePlanScore = (plan, mode) => {
        if (mode === 'min_loss') {
            let score = -(plan.reduce((acc, p) => acc + (p.remainder * p.qty), 0));
            // 150mm 미만의 잔재가 하나라도 포함된 플랜은 즉시 폐기 (-10억점)
            let badCount = plan.filter(p => p.remainder < 150 && p.remainder > 0).reduce((acc, p) => acc + p.qty, 0);

                score -= (pattern.remainder * 10);

        return score;

            }
            if (availableStocks.length === 0)
                availableStocks = [6000];
            // LOSS 최소화 모드의 시뮬레이션 횟수를 8000번으로 대폭 상향
            const SIMULATION_RUNS = mode === 'min_rows' ? 2000 : 8000;
            const validPlans = [];
            for (let i = 0; i < SIMULATION_RUNS; i++) {
                const plan = solvePatternBased(groupItems, availableStocks, mode, 'mixed', true, stockLimits);
                if (plan.length > 0) {
                    const score = calculatePlanScore(plan, mode);
                    validPlans.push({ plan, score });
                }
            }
            if (mode === 'min_rows') {
                for (let i = 0; i < SIMULATION_RUNS; i++) {
                    const plan = solvePatternBased(groupItems, availableStocks, mode, 'balanced', true, stockLimits);
                    if (plan.length > 0) {
                        const score = calculatePlanScore(plan, mode);
                        validPlans.push({ plan, score });
                    }
                }
            }
            if (validPlans.length > 0) {
                validPlans.sort((a, b) => {
                    if (b.score !== a.score)
                        return b.score - a.score;
                    return a.plan.reduce((acc, p) => acc + (p.remainder * p.qty), 0) - b.plan.reduce((acc, p) => acc + (p.remainder * p.qty), 0);
                });
                const bestPlan = validPlans[0].plan;
                // 동기화/정렬 로직 추가: 원본 길이 내림차순 -> 마킹 기준 오름차순 (자연정렬)
                bestPlan.sort((a, b) => {
                    const lenDiff = (parseFloat(b.stockLength) || 0) - (parseFloat(a.stockLength) || 0);
                    if (lenDiff !== 0)
                        return lenDiff;
                    // 내부 컷팅 파트들을 길이순으로 정렬한 뒤 마킹 문자열 결합하여 비교 (C1, C2, C10 등 자연스러운 숫자 정렬 포함)
                    const aMark = [...a.parts].sort((x, y) => parseFloat(x.length) - parseFloat(y.length)).map(x => x.marking || '').join(',');
                    const bMark = [...b.parts].sort((x, y) => parseFloat(x.length) - parseFloat(y.length)).map(x => x.marking || '').join(',');
                    return aMark.localeCompare(bMark, undefined, { numeric: true, sensitivity: 'base' });
                });
                const totalBars = bestPlan.reduce((acc, p) => acc + p.qty, 0);
                const totalStockLen = bestPlan.reduce((acc, p) => acc + (p.stockLength * p.qty), 0);
                const totalLoss = bestPlan.reduce((acc, p) => acc + (p.remainder * p.qty), 0);
                const lossRate = totalStockLen ? ((totalLoss / totalStockLen) * 100).toFixed(2) : 0;

            }

        return computedResults;
    };
    const processGridData = () => { const data = getCurrentData(); const items = parseItemsFromGrid(data.gridData, data.colMapping, data.spec, data.thickness); if (items.length === 0) {

    const runAllDongs = () => { setIsCalculating(true); setTimeout(() => { const newResults = {}; let processedCount = 0; dongs.forEach(dName => { const dData = dongData[dName]; if (!dData || !dData.gridData || dData.gridData.length === 0)
        return; const items = parseItemsFromGrid(dData.gridData, dData.colMapping, dData.spec, dData.thickness); if (items.length > 0) {
        newResults[dName] = { min_rows: runAdvancedOptimization(items, 'min_rows'), min_loss: runAdvancedOptimization(items, 'min_loss') };
        processedCount++;

        setResultsByDong(newResults);

    } setIsCalculating(false); }, 100); };
    return (React.createElement("div", { className: "min-h-screen bg-gray-50 text-gray-900 font-sans flex" },
        React.createElement(Sidebar, { viewMode: viewMode, setViewMode: setViewMode, projectInfo: projectInfo, setProjectInfo: setProjectInfo, isNoDongMode: isNoDongMode, setIsNoDongMode: setIsNoDongMode }),
        React.createElement("div", { className: "flex-1 ml-64 p-8 print:m-0 print:p-0" },
            viewMode === 'input' && (React.createElement(InputView, { currentDong: currentDong, dongs: dongs, setCurrentDong: setCurrentDong, addDong: addDong, deleteDong: deleteDong, renameDong: renameDong, data: getCurrentData(), updateCurrentData: updateCurrentData, activeTab: activeTab, setActiveTab: setActiveTab, customStocks: customStocks, setCustomStocks: setCustomStocks, processGridData: processGridData, handlePaste: handlePaste, runAllDongs: runAllDongs, globalSettings: STANDARD_STOCKS, isUserStockMode: isUserStockMode, setIsUserStockMode: setIsUserStockMode, userStockList: userStockList, setUserStockList: setUserStockList, setViewMode: setViewMode, isCalculating: isCalculating, isNoDongMode: isNoDongMode, handleFetchStock: handleFetchStock, isGapiReady: isGapiReady, isLoggedIn: isLoggedIn, handleLogin: handleLogin, inputMode: inputMode, handleInputModeChange: handleInputModeChange })),
            viewMode === 'result' && (React.createElement(ResultView, { currentDong: currentDong, dongs: dongs, setCurrentDong: setCurrentDong, addDong: addDong, deleteDong: deleteDong, renameDong: renameDong, resultsByDong: resultsByDong, runAllDongs: runAllDongs, projectInfo: projectInfo, isNoDongMode: isNoDongMode, dongData: dongData })))));
}

root.render(React.createElement(App, null));
